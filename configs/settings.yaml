# 集中配置，代码里别硬编码超参
rag:
  # 本地网速受限用轻量 bge-small-zh（~100MB）；服务器/好网络换回 BAAI/bge-m3
  embed_model: models/bge-small-zh-v1.5
  # 预训练重排基线；阶段 E 微调产物在 models/bge-reranker-ft（评估自动对比）
  rerank_model: models/bge-reranker-base
  chunk_size: 400
  chunk_overlap: 50
  k_recall: 20        # 召回数（喂给 reranker）
  k_final: 5          # 重排后最终喂给 LLM 的条数
  index_dir: data/index

agent:
  max_revise: 2       # Critic 反思回路最大轮次，防死循环
  subquestion_max: 5

data:
  cache_dir: data/cache
